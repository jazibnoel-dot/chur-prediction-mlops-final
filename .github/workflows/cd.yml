name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          space_id = os.environ.get("HF_SPACE_ID", "")
          if not space_id:
              raise SystemExit("HF_SPACE_ID secret is required")

          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".",
              repo_id=space_id,
              repo_type="space",
              ignore_patterns=["venv/**", ".git/**", "data/raw/*.csv", "__pycache__/**"],
          )
          print(f"Deployed to https://huggingface.co/spaces/{space_id}")
          PY

      - name: Health check deployed Space
        env:
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          SPACE_URL="https://${HF_SPACE_ID//\//-}.hf.space/health"
          echo "Checking ${SPACE_URL}"
          for attempt in $(seq 1 12); do
            if curl -fsS "${SPACE_URL}"; then
              exit 0
            fi
            echo "Waiting for Space to become healthy (${attempt}/12)..."
            sleep 20
          done
          echo "Space health check failed"
          exit 1
